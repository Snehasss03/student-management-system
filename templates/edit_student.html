{% extends 'base.html' %}

{% block content %}

<div class="card p-4 shadow">

<h2>Edit Student</h2>

<form method="POST">

<input
type="text"
name="name"
value="{{student.name}}"
class="form-control mb-3"
>

<input
type="text"
name="course"
value="{{student.course}}"
class="form-control mb-3"
>

<input
type="email"
name="email"
value="{{student.email}}"
class="form-control mb-3"
>

<input
type="text"
name="mobile"
value="{{student.mobile}}"
class="form-control mb-3"
>

<button class="btn btn-warning">
Update Student
</button>

</form>

</div>

{% endblock %}
