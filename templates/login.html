{% extends 'base.html' %}

{% block content %}

<div class="card p-4 shadow">

<h2>Login</h2>

<form method="POST">

    <input
        type="text"
        name="username"
        class="form-control mb-3"
        placeholder="Username"
    >

    <input
        type="password"
        name="password"
        class="form-control mb-3"
        placeholder="Password"
    >

    <button class="btn btn-dark">
        Login
    </button>

</form>

<p class="mt-3">
    Don't have account?
    <a href="/register">Register</a>
</p>

</div>

{% endblock %}
