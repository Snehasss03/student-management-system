{% extends 'base.html' %}

{% block content %}

<div class="card p-4 shadow">

<h2>Register</h2>

<form method="POST">

    <input
        type="text"
        name="username"
        class="form-control mb-3"
        placeholder="Username"
    >

    <input
        type="password"
        name="password"
        class="form-control mb-3"
        placeholder="Password"
    >

    <button class="btn btn-success">
        Register
    </button>

</form>

</div>

{% endblock %}
